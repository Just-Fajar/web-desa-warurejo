# Nginx Security Hardening for Laravel
# Include this file inside your server block:
# include nginx-security.conf;

# Prevent clickjacking attacks by ensuring frame is not displayed
add_header X-Frame-Options "DENY" always;

# Prevent MIME-type sniffing
add_header X-Content-Type-Options "nosniff" always;

# Disable XSS filter (recommended in modern browsers since it can introduce vulnerabilities)
add_header X-XSS-Protection "0" always;

# Control how much referrer information is sent with requests
add_header Referrer-Policy "strict-origin-when-cross-origin" always;

# HTTP Strict Transport Security (HSTS)
add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;

# Disable execution of scripts in upload directories
location ~* ^/storage/.*\.php$ {
    deny all;
}
location ~* ^/uploads/.*\.php$ {
    deny all;
}

# Block common exploitation attempts (e.g. system files, env files)
location ~ /\.(?!well-known).* {
    deny all;
}
location ~* \.(git|env|bak|sql|log)$ {
    deny all;
}

# Rate limiting settings (uncomment if limit_req_zone is defined in nginx.conf)
# limit_req zone=one burst=10 nodelay;
